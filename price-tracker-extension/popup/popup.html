<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Price Tracker</title>
  <link rel="stylesheet" href="../shared/styles.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="popup-header">
      <div class="popup-header-left">
        <span class="popup-logo" id="popup-logo"></span>
        <div>
          <h1 class="popup-title">Price Tracker</h1>
          <span class="popup-stats" id="popup-stats"></span>
        </div>
      </div>
    </div>

    <!-- Existing trackers for this page -->
    <div id="existing-trackers" class="popup-existing" hidden></div>

    <!-- Actions -->
    <div class="popup-actions">
      <button id="btn-track-auto" class="btn popup-btn popup-btn-auto" hidden>
        <!-- Text set dynamically -->
      </button>

      <button id="btn-track-manual" class="btn popup-btn popup-btn-manual" hidden>
        <span class="popup-btn-icon">🎯</span> Выбрать элемент
      </button>

      <button id="btn-show-trackers" class="btn btn-primary popup-btn popup-btn-dashboard">
        <span class="popup-btn-icon">📊</span> Дашборд
      </button>

      <p id="status-message" class="popup-status" hidden></p>
    </div>
  </div>

  <script src="../shared/icons.js"></script>
  <script src="popup.js"></script>
</body>
</html>
