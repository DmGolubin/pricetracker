<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Price Tracker</title>
  <link rel="stylesheet" href="../shared/styles.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <span class="popup-logo" id="popup-logo"></span>
      <h1 class="popup-title">Price Tracker</h1>
    </div>

    <div class="popup-actions">
      <button id="btn-track-manual" class="btn popup-btn popup-btn-track" hidden>
        Отслеживать цену на этой странице
      </button>

      <button id="btn-track-auto" class="btn btn-primary popup-btn popup-btn-track" hidden>
        <!-- Text set dynamically -->
      </button>

      <button id="btn-show-trackers" class="btn btn-primary popup-btn">
        Показать трекеры
      </button>

      <p id="status-message" class="popup-status" hidden></p>
    </div>
  </div>

  <script src="../shared/icons.js"></script>
  <script src="popup.js"></script>
</body>
</html>
