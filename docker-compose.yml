version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pricetracker
      POSTGRES_USER: pricetracker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_strong_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pricetracker -d pricetracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://pricetracker:${POSTGRES_PASSWORD:-changeme_strong_password}@db:5432/pricetracker
      PORT: 3000
      WEBAPP_URL: http://85.115.209.141:3000
      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  pgdata:
